name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - aarch64-macos
          - x86_64-macos
          - aarch64-linux
          - x86_64-linux
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Build
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe

      - name: Package
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          ARCHIVE="playpanda-${TAG}-${{ matrix.target }}"
          mkdir -p "$ARCHIVE/scripts"
          cp zig-out/bin/playpanda "$ARCHIVE/"
          cp scripts/*.py "$ARCHIVE/scripts/"
          cp LICENSE README.md "$ARCHIVE/"
          tar -czf "$ARCHIVE.tar.gz" "$ARCHIVE"

      - uses: actions/upload-artifact@v4
        with:
          name: playpanda-${{ matrix.target }}
          path: "*.tar.gz"

  upload:
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          echo "## Checksums" > checksums.txt
          echo '```' >> checksums.txt
          sha256sum artifacts/*.tar.gz >> checksums.txt
          echo '```' >> checksums.txt
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file checksums.txt --latest
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" artifacts/*.tar.gz
