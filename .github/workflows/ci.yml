name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Build
        run: zig build

      - name: Unit tests
        run: zig build test

      - name: Unit tests (ReleaseSafe)
        run: zig build test -Doptimize=ReleaseSafe

      - name: Integration test
        run: |
          # Test CLI
          ./zig-out/bin/playpanda --help | grep -q "Commands"
          ./zig-out/bin/playpanda --version | grep -q "playpanda"
          echo "CLI tests passed"

  cross-compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-macos
          - target: x86_64-macos
          - target: aarch64-linux
          - target: x86_64-linux
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Cross-compile ${{ matrix.target }}
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
